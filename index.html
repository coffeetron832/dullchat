<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>dullchat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>dullchat</h1>

    <p class="subtitle">
        Conversaciones privadas y temporales.
    </p>

    <div id="home">

        <label for="capacity">
            Capacidad máxima
        </label>

        <select id="capacity">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>

        <button id="createRoom">
            Crear sala
        </button>

    </div>

    <div id="room" class="hidden">

        <h2>DullChat</h2>

        <div class="info">

            <p>
                <strong>Sala:</strong>
                <span id="roomId">-</span>
            </p>

            <p>
                <strong>Tu ID:</strong>
                <span id="userId">-</span>
            </p>

            <p>
                <strong>Rol:</strong>
                <span id="role">-</span>
            </p>

            <p>
                <strong>Capacidad:</strong>
                <span id="roomCapacity">-</span>
            </p>

            <p>
                <strong>Conectados:</strong>
                <span id="connectedCount">1</span>
            </p>

        </div>

        <hr>

        <div class="share-box">

            <label for="shareLink">
                Enlace para compartir
            </label>

            <input
                type="text"
                id="shareLink"
                readonly
            >

            <button id="copyLink">
                Copiar enlace
            </button>

        </div>

        <hr>

        <div class="participants">

            <h3>Participantes</h3>

            <ul id="participantsList">
                <li>Cargando...</li>
            </ul>

        </div>

        <hr>

        <div class="chat-container">

            <div id="messages">
                <div class="message system">
                    <strong>Sistema:</strong> Bienvenido a DullChat.
                </div>
            </div>

            <div class="message-box">

                <input
                    type="text"
                    id="messageInput"
                    placeholder="Escribe un mensaje..."
                    maxlength="1000"
                    autocomplete="off"
                >

                <button id="sendBox">
                    Enviar
                </button>

            </div>

        </div>

        <hr>

        <div class="status">

            <p id="connectionStatus">
                Conectado a la red P2P
            </p>

        </div>

        <hr>

        <button
            id="destroyRoom"
            class="danger"
        >
            Destruir sala
        </button>

    </div>

</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script src="app.js"></script>

</body>
</html>
